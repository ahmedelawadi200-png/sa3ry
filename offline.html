<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a73e8">
<meta name="robots" content="noindex, follow">
<title>لا يوجد اتصال - سعري</title>
<!--
  Deliberately self-contained: no external fonts/icons/CDN links here.
  If this page is shown, it's precisely because the network is down, so
  anything that depends on a network request (Google Fonts, Font Awesome)
  could fail to load and leave the page half-styled. Everything below uses
  system fonts and inline SVG only.
-->
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f2f5;
    color: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
    padding: 24px;
    text-align: center;
  }
  .card {
    max-width: 380px;
    background: #fff;
    border-radius: 24px;
    padding: 36px 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  .icon {
    width: 88px;
    height: 88px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: #e8f0fe;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  h1 { font-size: 19px; font-weight: 800; margin: 0 0 10px; }
  p { font-size: 14px; color: #5f6368; line-height: 1.8; margin: 0 0 24px; }
  button {
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 13px 32px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  button:active { opacity: 0.85; }
  .hint { font-size: 12px; color: #9aa0a6; margin-top: 18px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تأكد من اتصالك بالشبكة وحاول تاني. أي منتجات وصفحات كنت فتحتها قبل كده لسه متاحة للتصفح من غير نت.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
    <p class="hint">سعري - مقارنة أسعار الإلكترونيات</p>
  </div>
</body>
</html>
